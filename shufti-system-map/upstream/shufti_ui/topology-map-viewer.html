<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shufti System Map</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04060f;
      --panel: rgba(17, 24, 39, 0.94);
      --border: rgba(139, 92, 246, 0.28);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --edge-pill: #4c1d95;
      --grid-line: rgba(148, 163, 184, 0.14);
      --grid-line-major: rgba(167, 139, 250, 0.22);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 12% 8%, rgba(139, 92, 246, 0.2), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(59, 130, 246, 0.14), transparent 24%),
        var(--bg);
      color: var(--text);
      font-family: Inter, "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .shell { max-width: 2100px; margin: 0 auto; padding: 16px 20px 28px; }
    .header {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 14px;
      padding: 16px 18px; border-radius: 18px; background: var(--panel);
      border: 1px solid var(--border); margin-bottom: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .title { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .tab {
      border: 1px solid var(--border); background: rgba(15, 23, 42, 0.75);
      color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: 0.88rem;
    }
    .tab.active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.45), rgba(59, 130, 246, 0.3));
      border-color: rgba(167, 139, 250, 0.55);
    }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .stat {
      padding: 8px 12px; border-radius: 10px; background: var(--panel);
      border: 1px solid var(--border); font-size: 0.82rem;
    }
    .stat strong { display: block; font-size: 1rem; margin-top: 2px; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px 280px;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 1400px) {
      .layout { grid-template-columns: minmax(0, 1fr) 300px; }
      .controls-panel { grid-column: 1 / -1; }
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }
    .canvas-wrap {
      border-radius: 20px; background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--border); padding: 12px; min-height: 72vh; overflow: auto;
    }
    #map-canvas { width: 100%; min-height: 68vh; display: block; }
    .lane-label {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .grid-line { stroke: var(--grid-line); stroke-width: 1; pointer-events: none; }
    .grid-line-major { stroke: var(--grid-line-major); stroke-width: 1.25; pointer-events: none; }
    .component-fo {
      color: #f8fafc;
      font-family: Inter, "IBM Plex Sans", "Segoe UI", sans-serif;
      line-height: 1.3;
      overflow: hidden;
      pointer-events: none;
    }
    .component-fo .box-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .component-fo .box-meta { font-size: 10px; color: #cbd5e1; margin-top: 2px; }
    .edge {
      fill: none;
      stroke: rgba(148, 163, 184, 0.55);
      stroke-linecap: square;
      stroke-linejoin: round;
    }
    .edge-hop {
      fill: none;
      stroke: rgba(148, 163, 184, 0.65);
      stroke-width: 1.5;
    }
    .edge-label { fill: #f8fafc; font-size: 10px; text-anchor: middle; }
    .edge-pill {
      fill: var(--edge-pill);
      stroke: var(--accent);
      stroke-width: 1;
    }
    .port-dot { fill: #fbbf24; opacity: 0.85; }
    .component { cursor: pointer; }
    .component rect { stroke: rgba(148, 163, 184, 0.35); stroke-width: 1; transition: opacity 0.15s; }
    .component.selected rect { stroke-width: 2.5; }
    .component.focus-peer rect { stroke-width: 2; }
    .component.dim { opacity: 0.28; }
    .edge.dim { opacity: 0.14; }
    .edge.focus { opacity: 1; }
    .color-swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 3px;
      margin-right: 6px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2);
    }
    .component.no-glow { filter: none; }
    .component-title { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .component-meta { fill: #cbd5e1; font-size: 11px; }
    .sidebar, .controls-panel {
      border-radius: 18px; background: var(--panel); border: 1px solid var(--border);
      padding: 16px 18px; max-height: 80vh; overflow: auto;
    }
    .sidebar h2, .controls-panel h2 { margin: 0 0 8px; font-size: 1.05rem; }
    .sidebar h3, .controls-panel h3 {
      margin: 14px 0 8px; font-size: 0.8rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .control-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 6px 0; font-size: 0.82rem;
    }
    .control-row label { color: var(--text); flex: 1; }
    .control-row input[type="checkbox"] { accent-color: var(--accent); }
    .control-row select {
      background: rgba(15, 23, 42, 0.85); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font-size: 0.8rem;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .pill-row span {
      font-size: 0.75rem; padding: 4px 8px; border-radius: 999px;
      background: rgba(76, 29, 149, 0.5); border: 1px solid var(--border);
    }
    .file-list { display: flex; flex-direction: column; gap: 8px; }
    .file-row {
      padding: 8px 10px; border-radius: 10px; background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15); font-size: 0.8rem;
    }
    .file-row strong { display: block; color: var(--text); word-break: break-all; font-weight: 500; }
    .file-row span { color: var(--muted); font-size: 0.75rem; }
    .grid-sectors {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px;
    }
    .sector {
      padding: 12px 14px; border-radius: 14px; background: var(--panel);
      border: 1px solid var(--border); cursor: pointer;
    }
    .error { color: #fca5a5; white-space: pre-wrap; padding: 12px; }
    .hidden { display: none !important; }
    .panel-frame {
      width: 100%; min-height: 70vh; border: 1px solid var(--border);
      border-radius: 16px; background: #060914;
    }
    .hint { color: var(--muted); font-size: 0.75rem; line-height: 1.4; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div>
        <div class="title">System component map</div>
        <div class="subtitle" id="page-subtitle">Loading…</div>
      </div>
      <div class="tabs" role="tablist">
        <button type="button" class="tab active" data-view="system">System map</button>
        <button type="button" class="tab" data-view="sectors">Sector grid</button>
        <button type="button" class="tab" data-view="mermaid">Mermaid export</button>
      </div>
    </header>

    <div class="stats" id="stats-row"></div>
    <div id="error-root" class="error hidden"></div>

    <section id="view-system">
      <div class="layout">
        <div class="canvas-wrap">
          <svg id="map-canvas" role="img" aria-label="System component map"></svg>
        </div>
        <aside class="sidebar" id="sidebar">
          <h2>Select a component</h2>
          <p class="subtitle">Click a box on the map for files, metrics, and coupling.</p>
        </aside>
        <aside class="controls-panel" id="controls-panel" aria-label="Map display controls"></aside>
      </div>
    </section>

    <section id="view-sectors" class="hidden">
      <div class="grid-sectors" id="sector-grid"></div>
    </section>

    <section id="view-mermaid" class="hidden">
      <iframe id="mermaid-frame" class="panel-frame" title="Filesystem overview diagram"></iframe>
    </section>
  </div>

  <script type="module">
    const GRID_CELL = 16;
    const ROUTING_PAD = 8;
    const EDGE_LANE_SPACING = 14;
    const GUTTER_OUT = 22;
    const GUTTER_IN = 22;
    const VIEWER_BUILD = "2026.05.22-v3";
    const PREFS_KEY = "shufti-map-viewer-prefs-v2";
    const ROLE_COLORS = {
      gateway: "#7c3aed",
      service: "#2563eb",
      core: "#0891b2",
      data: "#059669",
      integration: "#ca8a04",
      support: "#64748b",
    };
    const FOCUS_COLORS = [
      { id: "amber", label: "Amber", value: "#fbbf24" },
      { id: "violet", label: "Violet", value: "#a78bfa" },
      { id: "cyan", label: "Cyan", value: "#22d3ee" },
      { id: "green", label: "Green", value: "#4ade80" },
    ];
    const DEFAULT_PREFS = {
      layers: {
        grid: false,
        lanes: true,
        edges: true,
        edgeLabels: true,
        components: true,
      },
      display: {
        heatFill: true,
        showTitle: true,
        showFilesLines: true,
        showDeps: true,
        showStubs: true,
        edgeStyle: "orthogonal",
        edgeWidth: "md",
        colorMode: "heat",
        focusHighlight: true,
        highlightConnectedEdges: true,
        dimUnfocused: true,
        focusColor: "#fbbf24",
        componentGlow: true,
        edgesOnTop: false,
        routeAroundBoxes: true,
        edgeHops: true,
      },
      debug: {
        showPorts: false,
      },
    };

    const params = new URLSearchParams(window.location.search);
    const runId = params.get("run_id");

    const views = {
      system: document.getElementById("view-system"),
      sectors: document.getElementById("view-sectors"),
      mermaid: document.getElementById("view-mermaid"),
    };
    const tabs = document.querySelectorAll(".tab[data-view]");
    const subtitle = document.getElementById("page-subtitle");
    const statsRow = document.getElementById("stats-row");
    const sidebar = document.getElementById("sidebar");
    const controlsPanel = document.getElementById("controls-panel");
    const mapCanvas = document.getElementById("map-canvas");
    const sectorGrid = document.getElementById("sector-grid");
    const mermaidFrame = document.getElementById("mermaid-frame");
    const errorRoot = document.getElementById("error-root");

    let apiPayload = null;
    let selectedDrilldownId = null;
    let viewerPrefs = loadPrefs();

    function loadPrefs() {
      try {
        const raw = localStorage.getItem(PREFS_KEY);
        if (!raw) return structuredClone(DEFAULT_PREFS);
        const parsed = JSON.parse(raw);
        if (parsed.display?.showStubsOnBox !== undefined && parsed.display.showStubs === undefined) {
          parsed.display.showStubs = parsed.display.showStubsOnBox;
        }
        return deepMerge(structuredClone(DEFAULT_PREFS), parsed);
      } catch {
        return structuredClone(DEFAULT_PREFS);
      }
    }

    function savePrefs() {
      localStorage.setItem(PREFS_KEY, JSON.stringify(viewerPrefs));
    }

    function deepMerge(base, patch) {
      for (const [key, value] of Object.entries(patch || {})) {
        if (value && typeof value === "object" && !Array.isArray(value)) {
          base[key] = deepMerge(base[key] || {}, value);
        } else {
          base[key] = value;
        }
      }
      return base;
    }

    function snap(value) {
      return Math.round(value / GRID_CELL) * GRID_CELL;
    }

    function edgeStrokeWidth() {
      const map = { sm: 1, md: 1.5, lg: 2.75 };
      return map[viewerPrefs.display.edgeWidth] || 1.5;
    }

    function showError(message) {
      errorRoot.textContent = message;
      errorRoot.classList.remove("hidden");
    }

    function setView(name) {
      for (const [key, node] of Object.entries(views)) {
        node.classList.toggle("hidden", key !== name);
      }
      for (const tab of tabs) {
        tab.classList.toggle("active", tab.dataset.view === name);
      }
    }

    for (const tab of tabs) {
      tab.addEventListener("click", () => setView(tab.dataset.view));
    }

    function escapeXml(value) {
      return String(value ?? "").replace(/[<>&"]/g, (ch) => ({
        "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;",
      })[ch]);
    }

    function escapeHtml(value) {
      return escapeXml(value);
    }

    function fmt(n) {
      return Number(n || 0).toLocaleString();
    }

    function stubDensity(lines, stubs) {
      const lineCount = Number(lines) || 0;
      const stubCount = Number(stubs) || 0;
      if (!lineCount) return "—";
      return `${(stubCount / lineCount * 1000).toFixed(1)} / 1k lines`;
    }

    function heatColor(value) {
      if (value >= 0.75) return "#ea580c";
      if (value >= 0.45) return "#2563eb";
      if (value >= 0.18) return "#1d4ed8";
      return "#1e293b";
    }

    function componentFill(node) {
      const mode = viewerPrefs.display.colorMode || "heat";
      const metrics = node.metrics || {};
      if (mode === "role") return ROLE_COLORS[node.role] || "#334155";
      if (mode === "neutral") return "#1e293b";
      if (viewerPrefs.display.heatFill === false) return "#1e293b";
      return heatColor(metrics.static_heat || 0);
    }

    function nodeByDrilldown(nodes, drilldownId) {
      return nodes.find((n) => n.drilldown_id === drilldownId);
    }

    function buildFocusContext(nodes, edges) {
      const display = viewerPrefs.display;
      if (!selectedDrilldownId || display.focusHighlight === false) {
        return { active: false, nodeIds: new Set(), edgeKeys: new Set(), accent: display.focusColor || "#fbbf24" };
      }
      const selected = nodeByDrilldown(nodes, selectedDrilldownId);
      if (!selected) {
        return { active: false, nodeIds: new Set(), edgeKeys: new Set(), accent: display.focusColor || "#fbbf24" };
      }
      const nodeIds = new Set([selected.id]);
      const edgeKeys = new Set();
      for (const edge of edges) {
        if (edge.source === selected.id || edge.target === selected.id) {
          edgeKeys.add(`${edge.source}::${edge.target}`);
          nodeIds.add(edge.source);
          nodeIds.add(edge.target);
        }
      }
      return {
        active: true,
        selectedId: selected.id,
        nodeIds,
        edgeKeys,
        accent: display.focusColor || "#fbbf24",
      };
    }

    function roleLegendHtml() {
      return Object.entries(ROLE_COLORS).map(([role, color]) => (
        `<div class="control-row"><span><span class="color-swatch" style="background:${color}"></span>${role}</span></div>`
      )).join("");
    }

    function systemMapFromPayload(payload) {
      return payload.system_map
        || (payload.topology?.views?.system_overview)
        || {};
    }

    function drilldownsFromPayload(payload) {
      return payload.topology?.views?.component_drilldowns || {};
    }

    function renderControlsPanel() {
      const layer = viewerPrefs.layers;
      const display = viewerPrefs.display;
      const debug = viewerPrefs.debug;
      controlsPanel.innerHTML = `
        <h2>Map controls</h2>
        <p class="hint">Debug toggles persist in this browser. Release UI will expose a smaller subset.</p>
        <h3>Layers</h3>
        ${controlCheckbox("layers.grid", "Alignment grid (16px)", layer.grid)}
        ${controlCheckbox("layers.lanes", "Role lane headers (Gateway, Service, …)", layer.lanes)}
        ${controlCheckbox("layers.edges", "Dependency edges", layer.edges)}
        ${controlCheckbox("layers.edgeLabels", "Edge labels", layer.edgeLabels)}
        ${controlCheckbox("layers.components", "Components", layer.components)}
        <h3>Box metrics</h3>
        ${controlCheckbox("display.showTitle", "Component title", display.showTitle !== false)}
        ${controlCheckbox("display.showFilesLines", "Files & lines", display.showFilesLines !== false)}
        ${controlCheckbox("display.showDeps", "Dependency in/out", display.showDeps !== false)}
        ${controlCheckbox("display.showStubs", "Stub count & density", display.showStubs !== false)}
        <h3>Color &amp; focus</h3>
        <div class="control-row">
          <label for="color-mode">Box color mode</label>
          <select id="color-mode" data-pref="display.colorMode">
            <option value="heat" ${display.colorMode === "heat" || !display.colorMode ? "selected" : ""}>Heat (size/stubs)</option>
            <option value="role" ${display.colorMode === "role" ? "selected" : ""}>Role lane</option>
            <option value="neutral" ${display.colorMode === "neutral" ? "selected" : ""}>Neutral</option>
          </select>
        </div>
        ${display.colorMode === "role" ? `<div class="hint">${roleLegendHtml()}</div>` : ""}
        ${controlCheckbox("display.heatFill", "Apply heat scale (heat mode only)", display.heatFill !== false)}
        <div class="control-row">
          <label for="focus-color">Focus / edge highlight</label>
          <select id="focus-color" data-pref="display.focusColor">
            ${FOCUS_COLORS.map((c) => `<option value="${c.value}" ${display.focusColor === c.value ? "selected" : ""}>${c.label}</option>`).join("")}
          </select>
        </div>
        ${controlCheckbox("display.focusHighlight", "Highlight selected service + neighbors", display.focusHighlight !== false)}
        ${controlCheckbox("display.highlightConnectedEdges", "Color connected edges", display.highlightConnectedEdges !== false)}
        ${controlCheckbox("display.dimUnfocused", "Dim everything else", display.dimUnfocused !== false)}
        ${controlCheckbox("display.componentGlow", "Glow on selected box", display.componentGlow !== false)}
        <h3>Display</h3>
        ${controlCheckbox("display.routeAroundBoxes", "Grid path (avoid box borders)", display.routeAroundBoxes !== false)}
        ${controlCheckbox("display.edgeHops", "Hop arcs when edges cross", display.edgeHops !== false)}
        ${controlCheckbox("display.edgesOnTop", "Draw edges above boxes", display.edgesOnTop)}
        <div class="control-row">
          <label for="edge-style">Edge routing</label>
          <select id="edge-style" data-pref="display.edgeStyle">
            <option value="orthogonal" ${display.edgeStyle === "orthogonal" ? "selected" : ""}>Orthogonal (reference)</option>
            <option value="bezier" ${display.edgeStyle === "bezier" ? "selected" : ""}>Curved (legacy)</option>
          </select>
        </div>
        <div class="control-row">
          <label for="edge-width">Edge thickness</label>
          <select id="edge-width" data-pref="display.edgeWidth">
            <option value="sm" ${display.edgeWidth === "sm" ? "selected" : ""}>Small</option>
            <option value="md" ${display.edgeWidth === "md" ? "selected" : ""}>Medium</option>
            <option value="lg" ${display.edgeWidth === "lg" ? "selected" : ""}>Large</option>
          </select>
        </div>
        <h3>Debug</h3>
        ${controlCheckbox("debug.showPorts", "Show edge anchor ports", debug.showPorts)}
      `;

      const onPrefChange = (rerenderControls = false) => {
        savePrefs();
        if (rerenderControls) renderControlsPanel();
        renderSystemMap();
        renderSidebar();
      };
      controlsPanel.querySelectorAll('input[type="checkbox"][data-pref]').forEach((input) => {
        input.addEventListener("change", () => {
          setPrefPath(input.dataset.pref, input.checked);
          onPrefChange();
        });
      });
      controlsPanel.querySelectorAll("select[data-pref]").forEach((select) => {
        select.addEventListener("change", () => {
          setPrefPath(select.dataset.pref, select.value);
          onPrefChange(select.dataset.pref === "display.colorMode");
        });
      });
    }

    function controlCheckbox(path, label, checked) {
      return `<div class="control-row">
        <label for="${path}">${label}</label>
        <input type="checkbox" id="${path}" data-pref="${path}" ${checked ? "checked" : ""} />
      </div>`;
    }

    function setPrefPath(path, value) {
      const parts = path.split(".");
      let cursor = viewerPrefs;
      for (let i = 0; i < parts.length - 1; i += 1) {
        cursor = cursor[parts[i]];
      }
      cursor[parts[parts.length - 1]] = value;
    }

    function renderStats(summary, analysisRoot, componentCount, edgeCount) {
      const items = [
        ["Components", componentCount],
        ["Coupling edges", edgeCount],
        ["Files", summary.file_count],
        ["Lines", summary.line_count],
        ["Stubs", summary.stub_count],
      ];
      statsRow.innerHTML = items.map(([label, value]) => (
        `<div class="stat"><span>${label}</span><strong>${fmt(value)}</strong></div>`
      )).join("");
      subtitle.textContent = `${analysisRoot || "unknown"} · viewer ${VIEWER_BUILD} · fingerprint ${summary.topology_fingerprint || "n/a"}`;
    }

    function gridLayerSvg(maxX, maxY) {
      if (!viewerPrefs.layers.grid) return "";
      const lines = [];
      for (let x = 0; x <= maxX; x += GRID_CELL) {
        const major = x % (GRID_CELL * 5) === 0;
        const cls = major ? "grid-line-major" : "grid-line";
        lines.push(`<line class="${cls}" x1="${x}" y1="0" x2="${x}" y2="${maxY}" />`);
      }
      for (let y = 0; y <= maxY; y += GRID_CELL) {
        const major = y % (GRID_CELL * 5) === 0;
        const cls = major ? "grid-line-major" : "grid-line";
        lines.push(`<line class="${cls}" x1="0" y1="${y}" x2="${maxX}" y2="${y}" />`);
      }
      return `<g data-layer="grid" style="opacity:1">${lines.join("")}</g>`;
    }

    function lanesLayerSvg(lanes) {
      if (!viewerPrefs.layers.lanes) return "";
      return `<g data-layer="lanes">${lanes.map((lane) => {
        const x = snap(72 + (lane.order ?? 0) * 320);
        return `<text class="lane-label" x="${x}" y="42">${escapeXml(lane.label || lane.id)}</text>`;
      }).join("")}</g>`;
    }

    function cellKey(gx, gy) {
      return `${gx},${gy}`;
    }

    function worldToCell(x, y) {
      return { gx: Math.round(x / GRID_CELL), gy: Math.round(y / GRID_CELL) };
    }

    function cellToWorld(gx, gy) {
      return { x: gx * GRID_CELL, y: gy * GRID_CELL };
    }

    function buildBlockedCells(nodes, excludeIds, maxGx, maxGy) {
      const blocked = new Set();
      for (const n of nodes) {
        if (excludeIds.has(n.id)) continue;
        const l = n.layout;
        const x1 = Math.floor((l.x - ROUTING_PAD) / GRID_CELL);
        const y1 = Math.floor((l.y - ROUTING_PAD) / GRID_CELL);
        const x2 = Math.ceil((l.x + l.width + ROUTING_PAD) / GRID_CELL);
        const y2 = Math.ceil((l.y + l.height + ROUTING_PAD) / GRID_CELL);
        for (let gx = x1; gx <= x2; gx += 1) {
          for (let gy = y1; gy <= y2; gy += 1) {
            if (gx >= 0 && gy >= 0 && gx <= maxGx && gy <= maxGy) {
              blocked.add(cellKey(gx, gy));
            }
          }
        }
      }
      return blocked;
    }

    function heuristic(gx, gy, tx, ty) {
      return (Math.abs(gx - tx) + Math.abs(gy - ty)) * GRID_CELL;
    }

    function astarRoute(x0, y0, x1, y1, blocked, soft, maxGx, maxGy) {
      const start = worldToCell(x0, y0);
      const end = worldToCell(x1, y1);
      const open = new Map();
      const cameFrom = new Map();
      const gScore = new Map();
      const startK = cellKey(start.gx, start.gy);
      const endK = cellKey(end.gx, end.gy);
      gScore.set(startK, 0);
      open.set(startK, heuristic(start.gx, start.gy, end.gx, end.gy));

      const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

      while (open.size > 0) {
        let current = null;
        let best = Infinity;
        for (const [k, f] of open.entries()) {
          if (f < best) {
            best = f;
            current = k;
          }
        }
        if (!current) break;
        open.delete(current);
        if (current === endK) {
          const path = [];
          let cur = current;
          while (cur) {
            const [gx, gy] = cur.split(",").map(Number);
            path.unshift([gx * GRID_CELL, gy * GRID_CELL]);
            cur = cameFrom.get(cur);
          }
          path[0] = [x0, y0];
          path[path.length - 1] = [x1, y1];
          return simplifyOrthogonal(path);
        }
        const [cgx, cgy] = current.split(",").map(Number);
        const baseG = gScore.get(current) ?? Infinity;
        for (const [dx, dy] of dirs) {
          const ngx = cgx + dx;
          const ngy = cgy + dy;
          if (ngx < 0 || ngy < 0 || ngx > maxGx || ngy > maxGy) continue;
          const nk = cellKey(ngx, ngy);
          if (blocked.has(nk)) continue;
          const step = soft.has(nk) ? 4 : 1;
          const tg = baseG + step;
          if (tg < (gScore.get(nk) ?? Infinity)) {
            cameFrom.set(nk, current);
            gScore.set(nk, tg);
            open.set(nk, tg + heuristic(ngx, ngy, end.gx, end.gy));
          }
        }
      }
      return simplifyOrthogonal([[x0, y0], [x0, y1], [x1, y1]]);
    }

    function simplifyOrthogonal(points) {
      if (points.length < 2) return points;
      const out = [points[0]];
      for (let i = 1; i < points.length; i += 1) {
        const prev = out[out.length - 1];
        const cur = points[i];
        if (prev[0] === cur[0] && prev[1] === cur[1]) continue;
        if (out.length >= 2) {
          const prev2 = out[out.length - 2];
          const collinear = (prev2[0] === prev[0] && prev[0] === cur[0])
            || (prev2[1] === prev[1] && prev[1] === cur[1]);
          if (collinear) out.pop();
        }
        out.push(cur);
      }
      return out;
    }

    function pathToD(points) {
      return points.map((p, i) => `${i === 0 ? "M" : "L"} ${snap(p[0])} ${snap(p[1])}`).join(" ");
    }

    function edgeEndpoints(source, target) {
      const sx = source.layout.x + source.layout.width;
      const sy = source.layout.y + source.layout.height / 2;
      const tx = target.layout.x;
      const ty = target.layout.y + target.layout.height / 2;
      return { sx, sy, tx, ty };
    }

    function sortEdgesForFanOut(edges, nodes) {
      const bySource = new Map();
      for (const edge of edges) {
        if (!bySource.has(edge.source)) bySource.set(edge.source, []);
        bySource.get(edge.source).push(edge);
      }
      const order = new Map();
      for (const list of bySource.values()) {
        list.sort((a, b) => {
          const ta = nodes.find((n) => n.id === a.target);
          const tb = nodes.find((n) => n.id === b.target);
          const dy = (ta?.layout?.y ?? 0) - (tb?.layout?.y ?? 0);
          if (dy !== 0) return dy;
          return (ta?.layout?.x ?? 0) - (tb?.layout?.x ?? 0);
        });
        list.forEach((edge, index) => {
          order.set(edge, { laneIndex: index, laneCount: list.length });
        });
      }
      return order;
    }

    function registerPathCorridor(points, soft) {
      for (let i = 0; i < points.length - 1; i += 1) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[i + 1];
        const steps = Math.max(Math.abs(x2 - x1), Math.abs(y2 - y1)) / GRID_CELL + 1;
        for (let s = 0; s <= steps; s += 1) {
          const t = steps === 0 ? 0 : s / steps;
          const wx = x1 + (x2 - x1) * t;
          const wy = y1 + (y2 - y1) * t;
          const { gx, gy } = worldToCell(wx, wy);
          soft.add(cellKey(gx, gy));
        }
      }
    }

    function routeEdgeOnGrid(edge, source, target, laneIndex, laneCount, nodes, maxGx, maxGy, soft) {
      const exclude = new Set([source.id, target.id]);
      const blocked = buildBlockedCells(nodes, exclude, maxGx, maxGy);
      const { sx, sy, tx, ty } = edgeEndpoints(source, target);
      const laneOffset = (laneIndex - (laneCount - 1) / 2) * EDGE_LANE_SPACING;
      const portY = snap(sy + laneOffset);
      const srcRight = source.layout.x + source.layout.width;
      const tgtLeft = target.layout.x;
      const busX = snap(srcRight + GUTTER_OUT);
      const approachX = snap(tgtLeft - GUTTER_IN);

      const points = [[sx, sy]];
      if (laneCount > 1 && Math.abs(portY - sy) > 2) {
        points.push([sx, portY]);
      }
      points.push([busX, portY]);

      const mid = astarRoute(busX, portY, approachX, ty, blocked, soft, maxGx, maxGy);
      for (let i = 1; i < mid.length; i += 1) points.push(mid[i]);

      if (points[points.length - 1][0] !== tx || points[points.length - 1][1] !== ty) {
        points.push([tx, ty]);
      }
      return simplifyOrthogonal(points);
    }

    function legacyBezierPath(sx, sy, tx, ty) {
      const mid = sx + Math.max(60, (tx - sx) / 2);
      return `M ${snap(sx)} ${snap(sy)} C ${snap(mid)} ${snap(sy)}, ${snap(mid)} ${snap(ty)}, ${snap(tx)} ${snap(ty)}`;
    }

    function segmentOrientation(x1, y1, x2, y2) {
      if (Math.abs(y2 - y1) < 1) return "h";
      if (Math.abs(x2 - x1) < 1) return "v";
      return "d";
    }

    function segmentsFromPath(edgeId, points) {
      const segs = [];
      for (let i = 0; i < points.length - 1; i += 1) {
        segs.push({
          edgeId,
          i,
          x1: points[i][0],
          y1: points[i][1],
          x2: points[i + 1][0],
          y2: points[i + 1][1],
          orient: segmentOrientation(points[i][0], points[i][1], points[i + 1][0], points[i + 1][1]),
        });
      }
      return segs;
    }

    function segmentIntersectPoint(a, b) {
      if (a.orient === "h" && b.orient === "v") {
        const y = a.y1;
        const x = b.x1;
        if (x >= Math.min(a.x1, a.x2) - 1 && x <= Math.max(a.x1, a.x2) + 1
          && y >= Math.min(b.y1, b.y2) - 1 && y <= Math.max(b.y1, b.y2) + 1) {
          return { x, y, hop: "over-h" };
        }
      }
      if (a.orient === "v" && b.orient === "h") {
        const x = a.x1;
        const y = b.y1;
        if (x >= Math.min(b.x1, b.x2) - 1 && x <= Math.max(b.x1, b.x2) + 1
          && y >= Math.min(a.y1, a.y2) - 1 && y <= Math.max(a.y1, a.y2) + 1) {
          return { x, y, hop: "over-v" };
        }
      }
      return null;
    }

    function hopArcSvg(x, y, hop) {
      const r = 7;
      if (hop === "over-h") {
        return `<path class="edge-hop" d="M ${snap(x - r)} ${snap(y)} Q ${snap(x)} ${snap(y - r)} ${snap(x + r)} ${snap(y)}" />`;
      }
      return `<path class="edge-hop" d="M ${snap(x)} ${snap(y - r)} Q ${snap(x + r)} ${snap(y)} ${snap(x)} ${snap(y + r)}" />`;
    }

    function detectCrossingHops(routedPaths) {
      const hops = [];
      const allSegs = [];
      for (const { edgeId, points } of routedPaths) {
        allSegs.push(...segmentsFromPath(edgeId, points));
      }
      for (let i = 0; i < allSegs.length; i += 1) {
        for (let j = i + 1; j < allSegs.length; j += 1) {
          const a = allSegs[i];
          const b = allSegs[j];
          if (a.edgeId === b.edgeId) continue;
          const hit = segmentIntersectPoint(a, b) || segmentIntersectPoint(b, a);
          if (hit && viewerPrefs.display.edgeHops !== false) {
            hops.push(hopArcSvg(hit.x, hit.y, hit.hop));
          }
        }
      }
      return hops;
    }

    function edgeLabelText(edge) {
      const relation = edge.relation || "package_import";
      const weight = Number(edge.weight) || 1;
      if (weight <= 1) return relation;
      return `${relation} ×${weight}`;
    }

    function planAllEdgeRoutes(edges, nodes, maxX, maxY) {
      const maxGx = Math.ceil(maxX / GRID_CELL);
      const maxGy = Math.ceil(maxY / GRID_CELL);
      const fanOrder = sortEdgesForFanOut(edges, nodes);
      const soft = new Set();
      const routed = [];

      const sorted = [...edges].sort((a, b) => {
        const fa = fanOrder.get(a) || { laneIndex: 0 };
        const fb = fanOrder.get(b) || { laneIndex: 0 };
        if (a.source !== b.source) return a.source.localeCompare(b.source);
        return fa.laneIndex - fb.laneIndex;
      });

      for (const edge of sorted) {
        const source = nodes.find((n) => n.id === edge.source);
        const target = nodes.find((n) => n.id === edge.target);
        if (!source || !target) continue;
        const { laneIndex, laneCount } = fanOrder.get(edge) || { laneIndex: 0, laneCount: 1 };
        let points;
        if (viewerPrefs.display.routeAroundBoxes !== false && viewerPrefs.display.edgeStyle === "orthogonal") {
          points = routeEdgeOnGrid(edge, source, target, laneIndex, laneCount, nodes, maxGx, maxGy, soft);
          registerPathCorridor(points, soft);
        } else {
          const { sx, sy, tx, ty } = edgeEndpoints(source, target);
          points = [[sx, sy], [tx, ty]];
        }
        routed.push({ edge, source, target, points });
      }
      return routed;
    }

    function edgesLayerSvg(edges, nodes, maxX, maxY, focus) {
      if (!viewerPrefs.layers.edges) return "";
      const strokeW = edgeStrokeWidth();
      const routed = planAllEdgeRoutes(edges, nodes, maxX, maxY);
      const accent = focus.accent || "#fbbf24";
      const hops = detectCrossingHops(routed.map((r) => ({ edgeId: r.edge.source + "->" + r.edge.target, points: r.points })));
      const parts = [];

      for (const { edge, source, target, points } of routed) {
        const label = edgeLabelText(edge);
        const title = Number(edge.weight) > 1
          ? `${edge.weight} Python import paths aggregated between these sectors (one edge)`
          : label;
        let d;
        if (viewerPrefs.display.edgeStyle === "bezier") {
          const { sx, sy, tx, ty } = edgeEndpoints(source, target);
          d = legacyBezierPath(sx, sy, tx, ty);
        } else {
          d = pathToD(points);
        }
        const edgeKey = `${edge.source}::${edge.target}`;
        const isFocus = focus.active && focus.edgeKeys.has(edgeKey);
        const dim = focus.active && viewerPrefs.display.dimUnfocused !== false && !isFocus;
        const edgeClass = `edge${isFocus ? " focus" : ""}${dim ? " dim" : ""}`;
        const stroke = isFocus && viewerPrefs.display.highlightConnectedEdges !== false
          ? accent
          : "rgba(148, 163, 184, 0.55)";
        const sw = isFocus ? Math.max(strokeW + 1, 2.5) : strokeW;
        parts.push(`<path class="${edgeClass}" style="stroke:${stroke};stroke-width:${sw}" d="${d}" />`);
        if (viewerPrefs.debug.showPorts) {
          const p0 = points[0];
          const pN = points[points.length - 1];
          parts.push(`<circle class="port-dot" cx="${snap(p0[0])}" cy="${snap(p0[1])}" r="3" />`);
          parts.push(`<circle class="port-dot" cx="${snap(pN[0])}" cy="${snap(pN[1])}" r="3" />`);
        }
        if (viewerPrefs.layers.edgeLabels && points.length >= 2) {
          const midIdx = Math.floor((points.length - 1) / 2);
          const lx = snap((points[midIdx][0] + points[midIdx + 1][0]) / 2);
          const ly = snap((points[midIdx][1] + points[midIdx + 1][1]) / 2 - 12);
          const pillW = Math.max(72, label.length * 6.2);
          parts.push(`<rect class="edge-pill" x="${lx - pillW / 2}" y="${ly - 10}" width="${pillW}" height="18" rx="9" />`);
          parts.push(`<title>${escapeXml(title)}</title>`);
          parts.push(`<text class="edge-label" x="${lx}" y="${ly + 3}">${escapeXml(label)}</text>`);
        }
      }
      parts.push(...hops);
      return `<g data-layer="edges">${parts.join("")}</g>`;
    }

    function componentSvg(node, focus) {
      const layout = node.layout || {};
      const metrics = node.metrics || {};
      const fill = componentFill(node);
      const isSelected = selectedDrilldownId === node.drilldown_id;
      const isPeer = focus.active && focus.nodeIds.has(node.id) && !isSelected;
      const dim = focus.active && viewerPrefs.display.dimUnfocused !== false
        && !focus.nodeIds.has(node.id);
      const accent = focus.accent || "#fbbf24";
      const classes = ["component"];
      if (isSelected) classes.push("selected");
      if (isPeer) classes.push("focus-peer");
      if (dim) classes.push("dim");
      const stroke = isSelected || isPeer ? accent : "rgba(148, 163, 184, 0.35)";
      const strokeW = isSelected ? 2.5 : (isPeer ? 2 : 1);
      const useGlow = viewerPrefs.display.componentGlow !== false && isSelected;
      const disp = viewerPrefs.display;
      const metaLines = [];
      if (disp.showFilesLines !== false) {
        metaLines.push(`${escapeHtml(node.role)} · ${fmt(metrics.files)} files`);
        metaLines.push(`${fmt(metrics.lines)} lines`);
      }
      if (disp.showDeps !== false) {
        metaLines.push(`in ${fmt(metrics.dependency_in)} / out ${fmt(metrics.dependency_out)}`);
      }
      if (disp.showStubs !== false) {
        metaLines.push(`${fmt(metrics.stubs)} stubs · ${stubDensity(metrics.lines, metrics.stubs)}`);
      }
      const titleHtml = disp.showTitle !== false
        ? `<div class="box-title">${escapeHtml(node.label)}</div>`
        : "";
      const fo = metaLines.length
        ? `<foreignObject x="${layout.x + 10}" y="${layout.y + 8}" width="${layout.width - 20}" height="${layout.height - 16}">
            <div xmlns="http://www.w3.org/1999/xhtml" class="component-fo">${titleHtml}${metaLines.map((line) => `<div class="box-meta">${line}</div>`).join("")}</div>
          </foreignObject>`
        : "";
      return `<g class="${classes.join(" ")}" data-component="${escapeXml(node.drilldown_id)}" filter="${useGlow ? "url(#glow-focus)" : "none"}">
        <rect x="${layout.x}" y="${layout.y}" width="${layout.width}" height="${layout.height}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}" />
        ${fo}
      </g>`;
    }

    function componentsLayerSvg(nodes, focus) {
      if (!viewerPrefs.layers.components) return "";
      return `<g data-layer="components">${nodes.map((node) => componentSvg(node, focus)).join("")}</g>`;
    }

    function renderSystemMap() {
      const systemMap = systemMapFromPayload(apiPayload);
      const nodes = systemMap.nodes || [];
      const edges = systemMap.edges || [];
      const lanes = systemMap.lanes || [];
      if (!nodes.length) {
        mapCanvas.innerHTML = `<text x="40" y="60" fill="#94a3b8">No components in system map. Re-run map after topology export.</text>`;
        return;
      }

      const maxY = Math.max(760, ...nodes.map((n) => (n.layout?.y || 0) + (n.layout?.height || 120) + 100));
      const maxX = Math.max(1280, ...nodes.map((n) => (n.layout?.x || 0) + (n.layout?.width || 220) + 80));
      mapCanvas.setAttribute("viewBox", `0 0 ${maxX} ${maxY}`);

      const focus = buildFocusContext(nodes, edges);
      const gridLayer = gridLayerSvg(maxX, maxY);
      const lanesLayer = lanesLayerSvg(lanes);
      const edgesLayer = edgesLayerSvg(edges, nodes, maxX, maxY, focus);
      const componentsLayer = componentsLayerSvg(nodes, focus);

      const stack = viewerPrefs.display.edgesOnTop
        ? [gridLayer, lanesLayer, componentsLayer, edgesLayer]
        : [gridLayer, lanesLayer, edgesLayer, componentsLayer];

      mapCanvas.innerHTML = `
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow-focus"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        ${stack.join("")}
      `;

      mapCanvas.querySelectorAll("[data-component]").forEach((el) => {
        el.addEventListener("click", () => {
          selectedDrilldownId = el.getAttribute("data-component");
          renderSystemMap();
          renderSidebar();
        });
      });
    }

    function renderSidebar() {
      const drilldowns = drilldownsFromPayload(apiPayload);
      const selected = selectedDrilldownId ? drilldowns[selectedDrilldownId] : null;
      if (!selected) {
        sidebar.innerHTML = `
          <h2>Select a component</h2>
          <p class="subtitle">Click a box on the map for files, metrics, and coupling.</p>
        `;
        return;
      }
      const files = selected.files || [];
      const summary = selected.summary || {};
      sidebar.innerHTML = `
        <h2>${escapeXml(selected.label || selected.component_id)}</h2>
        <div class="pill-row">
          <span>${escapeXml(selected.role || "component")}</span>
          <span>${fmt(summary.lines)} lines</span>
          <span>${fmt(summary.files)} files</span>
          <span>${fmt(summary.stubs)} stubs</span>
          <span>${stubDensity(summary.lines, summary.stubs)}</span>
          <span>${fmt(summary.dependency_in)} deps in</span>
          <span>${fmt(summary.dependency_out)} deps out</span>
        </div>
        <section>
          <h3>Top files</h3>
          <div class="file-list">${files.slice(0, 20).map((file) => `
            <div class="file-row">
              <strong>${escapeXml(file.path || "")}</strong>
              <span>${fmt(file.lines)} lines · ${fmt(file.stub_count)} stubs · ${fmt(file.dependency_touch_count)} coupling touches</span>
            </div>`).join("") || "<span class=\"subtitle\">No files listed.</span>"}
        </section>
        <section>
          <h3>Live slots</h3>
          <p class="subtitle">Agent pins and braid streams attach here after live layer ships.</p>
        </section>
      `;
    }

    function renderSectorGrid() {
      const sectors = apiPayload.topology?.sectors || [];
      sectorGrid.innerHTML = sectors.map((sector) => `
        <article class="sector" data-id="${escapeXml(sector.id)}">
          <h3>${escapeXml(sector.label || sector.id)}</h3>
          <p class="subtitle">${fmt(sector.file_count)} files · ${fmt(sector.line_count)} lines · ${fmt(sector.stub_count)} stubs</p>
        </article>
      `).join("");
    }

    async function boot() {
      if (!runId) {
        showError("Missing run_id query parameter.");
        return;
      }
      renderControlsPanel();
      const response = await fetch(`/api/topology/latest?run_id=${encodeURIComponent(runId)}`);
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        showError(payload.error || payload.hint || `Failed to load topology (${response.status})`);
        return;
      }
      apiPayload = payload;
      const summary = payload.summary || payload.topology?.summary || {};
      const systemMap = systemMapFromPayload(payload);
      renderStats(
        summary,
        payload.analysis_root || payload.topology?.analysis_root,
        (systemMap.nodes || []).length,
        (systemMap.edges || []).length,
      );
      renderSystemMap();
      renderSidebar();
      renderSectorGrid();

      const topologyUrl = payload.code_topology_url || "";
      const overviewUrl = topologyUrl
        ? topologyUrl.replace("code_topology.json", "filesystem_overview.mmd")
        : null;
      mermaidFrame.src = overviewUrl
        ? `/static/architecture-viewer.html?src=${encodeURIComponent(overviewUrl)}&name=filesystem_overview`
        : "about:blank";

      if (!selectedDrilldownId && (systemMap.nodes || []).length) {
        selectedDrilldownId = systemMap.nodes[0].drilldown_id;
        renderSystemMap();
        renderSidebar();
      }
    }

    boot().catch((error) => showError(String(error)));
  </script>
</body>
</html>
