<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Viewer</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #091017;
      color: #e8eef5;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .shell {
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .meta {
      color: #9ab1c5;
      font-size: 0.9rem;
      word-break: break-all;
    }

    .canvas {
      padding: 24px;
      border-radius: 20px;
      background: #f7fafc;
      color: #0b1117;
      overflow: auto;
      min-height: calc(100vh - 140px);
    }

    .error {
      color: #f27c7c;
      white-space: pre-wrap;
      font-family: "IBM Plex Mono", "Cascadia Mono", monospace;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div>
        <div class="title" id="diagram-name">Mermaid Diagram</div>
        <div class="meta" id="diagram-src"></div>
      </div>
    </div>
    <div class="canvas">
      <div id="diagram-container">Loading diagram…</div>
    </div>
  </div>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    const params = new URLSearchParams(window.location.search);
    const src = params.get("src");
    const name = params.get("name") || "Mermaid Diagram";
    const diagramName = document.getElementById("diagram-name");
    const diagramSrc = document.getElementById("diagram-src");
    const container = document.getElementById("diagram-container");

    diagramName.textContent = name;
    diagramSrc.textContent = src || "No source provided";

    async function boot() {
      if (!src) {
        container.innerHTML = '<div class="error">Missing src query parameter.</div>';
        return;
      }

      const response = await fetch(src);
      let text = await response.text();
      // Mapper/compose .mmd files may include %%{init:...}%%; avoid double-init with viewer defaults.
      text = text.replace(/^%%\{init:[\s\S]*?\}\}%%\s*/m, "").trim();
      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        securityLevel: "loose",
        themeVariables: {
          fontFamily: "IBM Plex Sans, Segoe UI, sans-serif",
          primaryColor: "#b9efd8",
          primaryTextColor: "#0b1117",
          primaryBorderColor: "#0b1117",
          lineColor: "#27485b",
          secondaryColor: "#f6d9b6",
          tertiaryColor: "#edf5fb",
        },
      });

      try {
        const { svg } = await mermaid.render(`mermaid_${Date.now()}`, text);
        container.innerHTML = svg;
      } catch (error) {
        container.innerHTML = `<div class="error">${String(error)}\n\n${text}</div>`;
      }
    }

    boot().catch((error) => {
      container.innerHTML = `<div class="error">${String(error)}</div>`;
    });
  </script>
</body>
</html>
