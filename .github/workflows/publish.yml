# Release pipeline (planned in PLAN): tag → test → VSIX → GitHub Release → OpenVSX → npm.
# OpenVSX and npm jobs are scaffolded; they run only when secrets/packages are configured.

name: Publish

on:
  push:
    tags:
      - 'cursor-activity-v*'

permissions:
  contents: write

jobs:
  phase-tests:
    name: Regression (phases 0–2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cursor-activity/package-lock.json
      - run: npm ci
        working-directory: cursor-activity
      - run: chmod +x .cursor/hooks/append-activity.sh cursor/scripts/hooks/*.sh cursor/scripts/tests/*.sh cursor/scripts/run-phase-tests.sh cursor/scripts/validate-live.sh || true
      - run: bash cursor/scripts/run-phase-tests.sh 2

  build-vsix:
    name: Build VSIX
    needs: phase-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cursor-activity/package-lock.json
      - run: npm ci && npm run compile && npm run package
        working-directory: cursor-activity
      - uses: actions/upload-artifact@v4
        with:
          name: cursor-activity-vsix
          path: cursor-activity/*.vsix

  github-release:
    name: GitHub Release (attach VSIX)
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cursor-activity-vsix
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cursor Activity ${{ github.ref_name }}
          files: dist/*.vsix
          generate_release_notes: true

  # --- Registry publish (enable when credentials / packages are ready) ---

  publish-openvsx:
    name: Publish to OpenVSX
    needs: build-vsix
    runs-on: ubuntu-latest
    # Runs when repository secret OPEN_VSX_TOKEN is set (Personal Access Token from open-vsx.org).
    if: ${{ secrets.OPEN_VSX_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cursor-activity-vsix
          path: cursor-activity
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Publish VSIX to Open VSX Registry
        run: npx --yes ovsx publish cursor-activity/*.vsix -p "$OPEN_VSX_TOKEN"
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

  publish-npm:
    name: Publish npm packages
    needs: phase-tests
    runs-on: ubuntu-latest
    # Enable when shared packages exist (e.g. @agent-governance/* per DEC). Not cursor-activity VSIX.
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish workspace packages
        run: |
          echo "TODO: npm publish per package (governor-core, hooks SDK) when extracted"
          echo "Requires NPM_TOKEN secret and package.json publishConfig in each package"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
